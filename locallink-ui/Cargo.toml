[package]
name = "locallink-ui"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[[bin]]
name = "locallink-ui"
path = "src/core_control_main.rs"

[dependencies]
anyhow = "1"
eframe = "0.31"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_System_LibraryLoader",
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging"
] }
